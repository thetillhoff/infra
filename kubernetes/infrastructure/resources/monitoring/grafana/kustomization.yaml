apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- helmRelease.yaml
- grafana-admin.yaml
- grafana-discord-webhook.yaml

configMapGenerator:
- name: grafana-helm-values
  files:
  - values.yaml

configurations:
- kustomizeconfig.yaml # Used to map the generated configmap into the helmRelease
