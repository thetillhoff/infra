# ## Configure grafana dashboard providers
# ## ref: http://docs.grafana.org/administration/provisioning/#dashboards
# ##
# ## `path` must be /var/lib/grafana/dashboards/<provider_name>
# ##
# dashboardProviders: {}
# #  dashboardproviders.yaml:
# #    apiVersion: 1
# #    providers:
# #    - name: 'default'
# #      orgId: 1
# #      folder: ''
# #      type: file
# #      disableDeletion: false
# #      editable: true
# #      options:
# #        path: /var/lib/grafana/dashboards/default

# ## Configure grafana dashboard to import
# ## NOTE: To use dashboards you must also enable/configure dashboardProviders
# ## ref: https://grafana.com/dashboards
# ##
# ## dashboards per provider, use provider name as key.
# ## For dashboards downloaded via gnetId or url, the optional "title" key overrides
# ## the dashboard title in the downloaded JSON so the UI displays your custom title.
# ##
# dashboards: {}
#   # default:
#   #   some-dashboard:
#   #     json: |
#   #       $RAW_JSON
#   #   custom-dashboard:
#   #     file: dashboards/custom-dashboard.json
#   #   prometheus-stats:
#   #     title: My Custom Dashboard Title   # optional; overrides the dashboard title in the downloaded JSON
#   #     gnetId: 2
#   #     revision: 2
#   #     datasource: Prometheus
#   #   local-dashboard:
#   #     url: https://example.com/repository/test.json
#   #     curlOptions: "-sLf"
#   #     token: ''
#   #   local-dashboard-base64:
#   #     url: https://example.com/repository/test-b64.json
#   #     token: ''
#   #     b64content: true
#   #   local-dashboard-gitlab:
#   #     url: https://example.com/repository/test-gitlab.json
#   #     gitlabToken: ''
#   #   local-dashboard-bitbucket:
#   #     url: https://example.com/repository/test-bitbucket.json
#   #     bearerToken: ''
#   #   local-dashboard-azure:
#   #     url: https://example.com/repository/test-azure.json
#   #     basic: ''
#   #     acceptHeader: '*/*'

# ## Reference to external ConfigMap per provider. Use provider name as key and ConfigMap name as value.
# ## A provider dashboards must be defined either by external ConfigMaps or in values.yaml, not in both.
# ## ConfigMap data example:
# ##
# ## data:
# ##   example-dashboard.json: |
# ##     RAW_JSON
# ##
# dashboardsConfigMaps: {}
# #  default: ""

