# https://github.com/grafana-community/helm-charts/blob/main/charts/grafana/values.yaml

admin:
  existingSecret: grafana-admin
  userKey: admin-user
  passwordKey: admin-password

envFromSecret: grafana-discord-webhook

# Grafana's service port is named `service` (not something our port-name auto-discovery
# matches), so annotate the Service explicitly. Grafana exposes /metrics on the same
# port as the UI by default.
service:
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "80"

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:

    - name: Prometheus
      uid: prometheus
      type: prometheus
      url: http://prometheus-server
      access: proxy
      isDefault: true
      jsonData:
        timeInterval: 15s

    - name: Loki
      uid: loki
      type: loki
      url: http://loki-gateway
      access: proxy

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
    - name: default
      orgId: 1
      folder: ''
      type: file
      disableDeletion: false
      editable: true
      options:
        path: /var/lib/grafana/dashboards/default

dashboards:
  default:
    node-exporter-full:
      gnetId: 1860
      revision: 37
      datasource: Prometheus
    kubernetes-cluster:
      gnetId: 15520
      revision: 2
      datasource: Prometheus
    loki-logs:
      gnetId: 13639
      revision: 2
      datasource:
        - name: DS_LOKI
          value: Loki

alerting:
  contactpoints.yaml:
    apiVersion: 1
    contactPoints:
    - orgId: 1
      name: discord
      receivers:
      - uid: discord
        type: discord
        settings:
          url: $__env{DISCORD_WEBHOOK_URL}

  policies.yaml:
    apiVersion: 1
    policies:
    - orgId: 1
      receiver: discord
      group_by:
      - grafana_folder
      - alertname

  rules.yaml:
    apiVersion: 1
    groups:
    - orgId: 1
      name: cluster-health
      folder: Infrastructure
      interval: 60s
      rules:
      - uid: high-cpu
        title: High CPU usage
        condition: B
        for: 5m
        annotations:
          summary: "CPU usage on {{ $labels.instance }} is above 80% (value: {{ $values.A }}%)"
        data:
        - refId: A
          queryType: ''
          relativeTimeRange: { from: 600, to: 0 }
          datasourceUid: prometheus
          model:
            datasource: { type: prometheus, uid: prometheus }
            editorMode: code
            expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
            instant: true
            range: false
            intervalMs: 1000
            maxDataPoints: 43200
            refId: A
        - refId: B
          queryType: ''
          relativeTimeRange: { from: 0, to: 0 }
          datasourceUid: __expr__
          model:
            datasource: { type: __expr__, uid: __expr__, name: Expression }
            type: threshold
            expression: A
            conditions:
            - evaluator: { type: gt, params: [80, 0] }
              operator: { type: and }
              query: { params: [] }
              reducer: { type: avg, params: [] }
              type: query
            intervalMs: 1000
            maxDataPoints: 43200
            refId: B
      - uid: high-memory
        title: High memory usage
        condition: B
        for: 5m
        annotations:
          summary: "Memory usage on {{ $labels.instance }} is above 85% (value: {{ $values.A }}%)"
        data:
        - refId: A
          queryType: ''
          relativeTimeRange: { from: 600, to: 0 }
          datasourceUid: prometheus
          model:
            datasource: { type: prometheus, uid: prometheus }
            editorMode: code
            expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100
            instant: true
            range: false
            intervalMs: 1000
            maxDataPoints: 43200
            refId: A
        - refId: B
          queryType: ''
          relativeTimeRange: { from: 0, to: 0 }
          datasourceUid: __expr__
          model:
            datasource: { type: __expr__, uid: __expr__, name: Expression }
            type: threshold
            expression: A
            conditions:
            - evaluator: { type: gt, params: [85, 0] }
              operator: { type: and }
              query: { params: [] }
              reducer: { type: avg, params: [] }
              type: query
            intervalMs: 1000
            maxDataPoints: 43200
            refId: B
      - uid: high-disk
        title: High disk usage
        condition: B
        for: 5m
        annotations:
          summary: "Disk {{ $labels.mountpoint }} on {{ $labels.instance }} is above 85% full (value: {{ $values.A }}%)"
        data:
        - refId: A
          queryType: ''
          relativeTimeRange: { from: 600, to: 0 }
          datasourceUid: prometheus
          model:
            datasource: { type: prometheus, uid: prometheus }
            editorMode: code
            expr: (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100
            instant: true
            range: false
            intervalMs: 1000
            maxDataPoints: 43200
            refId: A
        - refId: B
          queryType: ''
          relativeTimeRange: { from: 0, to: 0 }
          datasourceUid: __expr__
          model:
            datasource: { type: __expr__, uid: __expr__, name: Expression }
            type: threshold
            expression: A
            conditions:
            - evaluator: { type: gt, params: [85, 0] }
              operator: { type: and }
              query: { params: [] }
              reducer: { type: avg, params: [] }
              type: query
            intervalMs: 1000
            maxDataPoints: 43200
            refId: B
      # "No data" is a legitimate healthy state for the rules below (pod hasn't
      # restarted / nothing is pending), so map NoData -> OK instead of firing
      # the default DatasourceNoData meta-alert.
      - uid: pod-restarts
        title: Pod restart loop
        condition: B
        for: 10m
        noDataState: OK
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} restarted {{ $values.A }} times in the last 10 minutes"
        data:
        - refId: A
          queryType: ''
          relativeTimeRange: { from: 600, to: 0 }
          datasourceUid: prometheus
          model:
            datasource: { type: prometheus, uid: prometheus }
            editorMode: code
            expr: increase(kube_pod_container_status_restarts_total[10m])
            instant: true
            range: false
            intervalMs: 1000
            maxDataPoints: 43200
            refId: A
        - refId: B
          queryType: ''
          relativeTimeRange: { from: 0, to: 0 }
          datasourceUid: __expr__
          model:
            datasource: { type: __expr__, uid: __expr__, name: Expression }
            type: threshold
            expression: A
            conditions:
            - evaluator: { type: gt, params: [3, 0] }
              operator: { type: and }
              query: { params: [] }
              reducer: { type: avg, params: [] }
              type: query
            intervalMs: 1000
            maxDataPoints: 43200
            refId: B
      - uid: pods-pending
        title: Pods stuck pending
        condition: B
        for: 5m
        noDataState: OK
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been Pending for more than 5 minutes"
        data:
        - refId: A
          queryType: ''
          relativeTimeRange: { from: 600, to: 0 }
          datasourceUid: prometheus
          model:
            datasource: { type: prometheus, uid: prometheus }
            editorMode: code
            expr: kube_pod_status_phase{phase="Pending"}
            instant: true
            range: false
            intervalMs: 1000
            maxDataPoints: 43200
            refId: A
        - refId: B
          queryType: ''
          relativeTimeRange: { from: 0, to: 0 }
          datasourceUid: __expr__
          model:
            datasource: { type: __expr__, uid: __expr__, name: Expression }
            type: threshold
            expression: A
            conditions:
            - evaluator: { type: gt, params: [0, 0] }
              operator: { type: and }
              query: { params: [] }
              reducer: { type: last, params: [] }
              type: query
            intervalMs: 1000
            maxDataPoints: 43200
            refId: B
      - uid: pvc-pending
        title: PVC stuck pending
        condition: B
        for: 5m
        noDataState: OK
        annotations:
          summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} has been Pending for more than 5 minutes"
        data:
        - refId: A
          queryType: ''
          relativeTimeRange: { from: 600, to: 0 }
          datasourceUid: prometheus
          model:
            datasource: { type: prometheus, uid: prometheus }
            editorMode: code
            expr: kube_persistentvolumeclaim_status_phase{phase="Pending"}
            instant: true
            range: false
            intervalMs: 1000
            maxDataPoints: 43200
            refId: A
        - refId: B
          queryType: ''
          relativeTimeRange: { from: 0, to: 0 }
          datasourceUid: __expr__
          model:
            datasource: { type: __expr__, uid: __expr__, name: Expression }
            type: threshold
            expression: A
            conditions:
            - evaluator: { type: gt, params: [0, 0] }
              operator: { type: and }
              query: { params: [] }
              reducer: { type: last, params: [] }
              type: query
            intervalMs: 1000
            maxDataPoints: 43200
            refId: B
