# https://github.com/grafana-community/helm-charts/blob/main/charts/grafana/values.yaml

## Configure grafana datasources
## ref: http://docs.grafana.org/administration/provisioning/#datasources
##
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus-server
      access: proxy
      isDefault: true

# ## Configure grafana alerting (can be templated)
# ## ref: https://docs.grafana.com/alerting/set-up/provision-alerting-resources/file-provisioning/
# ##
# alerting: {}
#   # policies.yaml:
#   #   apiVersion: 1
#   #   policies:
#   #     - orgId: 1
#   #       receiver: first_uid
#   #
#   # rules.yaml:
#   #   apiVersion: 1
#   #   groups:
#   #     - orgId: 1
#   #       name: '{{ .Chart.Name }}_my_rule_group'
#   #       folder: my_first_folder
#   #       interval: 60s
#   #       rules:
#   #         - uid: my_id_1
#   #           title: my_first_rule
#   #           condition: A
#   #           data:
#   #             - refId: A
#   #               datasourceUid: '-100'
#   #               model:
#   #                 conditions:
#   #                   - evaluator:
#   #                       params:
#   #                         - 3
#   #                       type: gt
#   #                     operator:
#   #                       type: and
#   #                     query:
#   #                       params:
#   #                         - A
#   #                     reducer:
#   #                       type: last
#   #                     type: query
#   #                 datasource:
#   #                   type: __expr__
#   #                   uid: '-100'
#   #                 expression: 1==0
#   #                 intervalMs: 1000
#   #                 maxDataPoints: 43200
#   #                 refId: A
#   #                 type: math
#   #           dashboardUid: my_dashboard
#   #           panelId: 123
#   #           noDataState: Alerting
#   #           for: 60s
#   #           annotations:
#   #             some_key: some_value
#   #           labels:
#   #             team: sre_team_1
#   #
#   # contactpoints.yaml:
#   #   secret:
#   #     apiVersion: 1
#   #     contactPoints:
#   #       - orgId: 1
#   #         name: cp_1
#   #         receivers:
#   #           - uid: first_uid
#   #             type: pagerduty
#   #             settings:
#   #               integrationKey: XXX
#   #               severity: critical
#   #               class: ping failure
#   #               component: Grafana
#   #               group: app-stack
#   #               summary: |
#   #                 {{ `{{ include "default.message" . }}` }}
#   #
#   # templates.yaml:
#   #   apiVersion: 1
#   #   templates:
#   #     - orgId: 1
#   #       name: my_first_template
#   #       template: |
#   #         {{ `
#   #         {{ define "my_first_template" }}
#   #         Custom notification message
#   #         {{ end }}
#   #         ` }}
#   #
#   # mutetimes.yaml
#   #   apiVersion: 1
#   #   muteTimes:
#   #     - orgId: 1
#   #       name: mti_1
#   #       # refer to https://prometheus.io/docs/alerting/latest/configuration/#time_interval-0
#   #       time_intervals: {}

# ## Configure notifiers
