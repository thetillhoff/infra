# https://github.com/prometheus-community/helm-charts/blob/main/charts/prometheus/values.yaml

server:
  persistentVolume:
    enabled: true
    size: 5Gi
  retention: "15d"
  extraFlags:
    - web.enable-remote-write-receiver

prometheus-node-exporter:
  extraArgs:
    - --no-collector.kernel_hung

alertmanager:
  enabled: false

prometheus-pushgateway:
  enabled: false
