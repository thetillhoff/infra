apiVersion: v1
kind: ConfigMap
metadata:
  name: longhorn-caddy
  namespace: private-endpoints
data:
  Caddyfile: |
    {
      admin off
      auto_https off       # we supply our own cert; no ACME from Caddy
      https_port 8443      # unprivileged port so the pod need not run as root
    }
    https://longhorn.internal.thetillhoff.de {
      tls /certs/tls.crt /certs/tls.key
      reverse_proxy longhorn-frontend.longhorn.svc.cluster.local:80
    }
