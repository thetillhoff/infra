apiVersion: v1
kind: Service
metadata:
  name: hubble-internal
  namespace: private-endpoints
  annotations:
    tailscale.com/hostname: hubble-internal
    external-dns.alpha.kubernetes.io/hostname: hubble.internal.thetillhoff.de
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app: hubble-proxy
  ports:
    - name: https
      port: 443
      targetPort: 8443
