apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: caddy
  namespace: private-endpoints
spec:
  imageRepositoryRef:
    name: caddy
  # Track the alpine variant only (e.g. 2.9.1-alpine) and order by semver.
  filterTags:
    pattern: '^(?P<version>\d+\.\d+\.\d+)-alpine$'
    extract: '$version'
  policy:
    semver:
      range: '>=2.0.0'
