apiVersion: apps/v1
kind: Deployment
metadata:
  name: hubble-proxy
  namespace: private-endpoints
spec:
  # ponytail: single replica — homelab internal tooling. Bump to 2 if uptime matters.
  replicas: 1
  selector:
    matchLabels:
      app: hubble-proxy
  template:
    metadata:
      labels:
        app: hubble-proxy
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: caddy
          image: caddy:2.9.1-alpine # {"$imagepolicy": "private-endpoints:caddy"}
          ports:
            - containerPort: 8443
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
              readOnly: true
            - name: certs
              mountPath: /certs
              readOnly: true
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: caddyfile
          configMap:
            name: hubble-caddy
        - name: certs
          secret:
            secretName: hubble-internal-tls
        - name: config
          emptyDir: {}
        - name: data
          emptyDir: {}
