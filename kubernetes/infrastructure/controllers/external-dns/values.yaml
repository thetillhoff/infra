# https://github.com/kubernetes-sigs/external-dns/blob/master/charts/external-dns/values.yaml

provider:
  name: cloudflare

# Must be the Cloudflare ZONE (thetillhoff.de), not a subdomain — external-dns
# matches zones against this filter, and a subdomain filter makes it discard the
# whole zone ("zone thetillhoff.de not in domain filter") and create nothing.
# Safety comes from the TXT ownership registry below (txtOwnerId), NOT this filter:
# external-dns only ever modifies/deletes records it created (the internal.* ones),
# never the public records owned by pulumi/cert-manager.
domainFilters:
  - thetillhoff.de

# Only watch Services (the tailscale LoadBalancer services in private-endpoints).
sources:
  - service

# The tailscale operator writes BOTH an ip (100.x) and a <name>.ts.net hostname
# into the Service LB status. Restrict to A records so external-dns creates the
# A -> 100.x record and never a CNAME to the .ts.net name (which resolves only
# inside the tailnet and would break the record). TXT ownership is unaffected.
managedRecordTypes:
  - A

# sync => external-dns owns the internal.thetillhoff.de records and will delete
# ones whose source Service is gone. Ownership is tracked via TXT registry records.
policy: sync
txtOwnerId: hydra
txtPrefix: extdns- # avoids TXT/A name collision on the same record

# Note: cloudflare "proxied" defaults to false already, so tailnet 100.x IPs are
# created as plain DNS records (the orange-cloud proxy can't reach a private IP).

# Reuse cert-manager's Cloudflare token (same namespace, see kustomization.yaml).
env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: cloudflare-api-token
        key: api-token
