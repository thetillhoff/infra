apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
spec:
  chart:
    spec:
      chart: external-dns
      sourceRef:
        kind: HelmRepository
        name: external-dns
      version: 1.15.2 # From https://artifacthub.io/packages/helm/external-dns/external-dns
  interval: 10m

  valuesFrom:
    - kind: ConfigMap # This value is case sensitive
      name: external-dns-helm-values # automatically overridden by kustomize
      # valuesKey: values.yaml # `values.yaml` is the default key
