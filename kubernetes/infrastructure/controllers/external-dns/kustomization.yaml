apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Deployed into the cert-manager namespace so it can read the existing
# cloudflare-api-token secret directly (reuses cert-manager's Cloudflare token).
namespace: cert-manager
resources:
- helmRepository.yaml
- helmRelease.yaml

configMapGenerator:
- name: external-dns-helm-values
  files:
  - values.yaml

configurations:
- kustomizeconfig.yaml # Used to map the generated configmap into the helmRelease
