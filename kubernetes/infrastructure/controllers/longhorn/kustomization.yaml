apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: longhorn
resources:
- namespace.yaml
- helmRepository.yaml
- helmRelease.yaml

configMapGenerator:
- name: longhorn-helm-values
  files:
  - values.yaml

secretGenerator:
- name: backup-secret
  namespace: longhorn
  files:
  - backup-secret.yaml
- name: crypt-secret
  namespace: longhorn
  files:
  - crypt-secret.yaml

configurations:
- kustomizeconfig.yaml # Used to map the generated configmap into the helmRelease
