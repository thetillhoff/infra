longhornManager:
  # Longhorn exposes metrics on the longhorn-backend Service on port 9500 (named `manager`).
  # That port name isn't matched by the auto-discovery regex, so opt in via annotation.
  serviceAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9500"

persistence: # default storage class
  defaultClassReplicaCount: 2
  reclaimPolicy: Retain
  dataEngine: v1
  defaultDataLocality: best-effort
  encrypted: "true"
  # global secret that contains the encryption key that will be used for all volumes
  csi.storage.k8s.io/provisioner-secret-name: "crypt-secret"
  csi.storage.k8s.io/provisioner-secret-namespace: "longhorn"
  csi.storage.k8s.io/node-publish-secret-name: "crypt-secret"
  csi.storage.k8s.io/node-publish-secret-namespace: "longhorn"
  csi.storage.k8s.io/node-stage-secret-name: "crypt-secret"
  csi.storage.k8s.io/node-stage-secret-namespace: "longhorn"
  csi.storage.k8s.io/node-expand-secret-name: "crypt-secret"
  csi.storage.k8s.io/node-expand-secret-namespace: "longhorn"
csi:
  # 2 replicas required: single-replica + minAvailable PDB causes deadlock during node drain
  attacherReplicaCount: 2
  provisionerReplicaCount: 2
  resizerReplicaCount: 2
  snapshotterReplicaCount: 2
longhornUI:
  replicas: 1
defaultSettings:
  # V2 (SPDK) data engine off: it reserves 2Gi hugepages (vm.nr_hugepages in the
  # talos machine config) that shrink node-allocatable memory, and no volume uses
  # it (all volumes are V1). Keeping it on starved the nodes and OOMKilled the apiserver.
  v2DataEngine: false
  defaultReplicaCount: 2 # needs to be 1 if data-locality is strict-local
  replicaAutoBalance: best-effort
  nodeDrainPolicy: block-for-eviction
  storageReservedPercentageForDefaultDisk: 10 # default value of 25% is rather high
# -- Setting that allows you to update the default backupstore.
defaultBackupStore:
  # -- Endpoint used to access the default backupstore.
  backupTarget: s3://hydra-k8s-backup@backblaze/
  # -- Name of the Kubernetes secret associated with the default backup target.
  backupTargetCredentialSecret: backup-secret
  # -- Number of seconds that Longhorn waits before checking the default backupstore for new backups.
  pollInterval: 300
