apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
spec:
  chart:
    spec:
      chart: cert-manager
      sourceRef:
        kind: HelmRepository
        name: cert-manager
      version: v1.20.1 # From https://artifacthub.io/packages/helm/cert-manager/cert-manager
  interval: 10m

  valuesFrom:
    - kind: ConfigMap # This value is case sensitive
      name: cert-manager-helm-values # automatically overridden by kustomize
      # valuesKey: values.yaml # `values.yaml` is the default key
