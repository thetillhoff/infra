apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: trading
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: backend
          image: ghcr.io/thetillhoff/trading-backend:103 # {"$imagepolicy": "trading:trading-backend"}
          command:
            - "uvicorn"
            - "backend.main:app"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          env:
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: trading-postgres
                  key: dsn
            - name: IBKR_BROKER_URL
              value: http://ibkr-broker:8002
          ports:
            - containerPort: 8000
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: trading
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
