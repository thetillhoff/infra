apiVersion: v1
kind: LimitRange
metadata:
  name: trading-defaults
  namespace: trading
spec:
  # Default requests/limits for any container that doesn't set its own, so the ResourceQuota
  # (which requires memory requests+limits on every pod) is always satisfiable. Worker Jobs set
  # their own (Guaranteed) values via the operator; these defaults cover anything that doesn't.
  limits:
    - type: Container
      default:
        memory: 512Mi
        cpu: 500m
      defaultRequest:
        memory: 128Mi
        cpu: 100m
