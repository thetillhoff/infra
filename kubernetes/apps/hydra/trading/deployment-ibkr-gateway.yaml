apiVersion: apps/v1
kind: Deployment
metadata:
  name: ibkr-gateway
  namespace: trading
spec:
  replicas: 1
  # Recreate, not RollingUpdate: IBKR allows one live session, so two gateway pods can't
  # coexist — the old pod holds the session and blocks the new pod's login ("Existing session
  # detected"). Kill the old first so the session frees before the new logs in.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ibkr-gateway
  template:
    metadata:
      labels:
        app: ibkr-gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/gnzsnz/ib-gateway:stable
          envFrom:
            - secretRef:
                name: trading-ibkr
          env:
            # New login preempts a lingering session instead of hanging on the "Existing session
            # detected" dialog (IBC default is 'manual' = wait forever). 'primaryoverride' = the
            # existing session terminates and the new one proceeds — clean auto-recovery on a
            # Recreate rollout. ('primary'/'secondary' would kill the NEW session instead.)
            - name: EXISTING_SESSION_DETECTED_ACTION
              value: primaryoverride
          ports:
            - containerPort: 4003
              name: live
            - containerPort: 4004
              name: paper
          # socat on :4004 accepts immediately, so probe the real IB API on loopback :4002
          # (paper) instead — it opens only after login completes. bash /dev/tcp is used because
          # the image has bash but no nc. Live mode would probe 4001; switch if TRADING_MODE flips.
          startupProbe:
            exec:
              command: ["bash", "-c", "echo > /dev/tcp/127.0.0.1/4002"]
            periodSeconds: 10
            failureThreshold: 30   # ~5 min budget for a cold IB Gateway login
          readinessProbe:
            exec:
              command: ["bash", "-c", "echo > /dev/tcp/127.0.0.1/4002"]
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
