apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-operator
  namespace: trading
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trading-operator
  template:
    metadata:
      labels:
        app: trading-operator
    spec:
      serviceAccountName: trading-operator
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: operator
          image: ghcr.io/thetillhoff/trading-operator:65 # {"$imagepolicy": "trading:trading-operator"}
          command:
            - "python"
            - "-m"
            - "trading_operator"
          env:
            - name: WORKER_IMAGE
              value: ghcr.io/thetillhoff/trading-worker:65 # {"$imagepolicy": "trading:trading-worker"}
            - name: PVC_NAME
              value: trading-data
            - name: NAMESPACE
              value: trading
            # Worker-job resources (memory request==limit==value, Guaranteed QoS). Retune here
            # without a new image; the operator restarts and new jobs pick up the values.
            - name: JOB_CPU
              value: "512m"
            - name: JOB_MEM_SIGNALS
              value: "512Mi"
            - name: JOB_MEM_SIMULATION
              value: "1Gi"
            - name: JOB_MEM_DOWNLOAD
              value: "768Mi"
            - name: JOB_MEM_PLANNING
              value: "384Mi"
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: trading-postgres
                  key: dsn
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
