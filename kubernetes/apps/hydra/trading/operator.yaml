apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-operator
  namespace: trading
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trading-operator
  template:
    metadata:
      labels:
        app: trading-operator
    spec:
      serviceAccountName: trading-operator
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: operator
          image: ghcr.io/thetillhoff/trading-operator:79 # {"$imagepolicy": "trading:trading-operator"}
          command:
            - "python"
            - "-m"
            - "trading_operator"
          env:
            - name: WORKER_IMAGE
              value: ghcr.io/thetillhoff/trading-worker:79 # {"$imagepolicy": "trading:trading-worker"}
            - name: PVC_NAME
              value: trading-data
            - name: NAMESPACE
              value: trading
            - name: MAX_INFLIGHT_JOBS
              value: "5" # cap concurrent grid Jobs low (was default 40): fewer live pods = lower peak cAdvisor/prometheus cardinality + apiserver churn. Matches the ~5 grid slots left by the pods=10 quota (minus ~5 always-on trading pods), so no FailedCreate churn. Slower grids, safer.
            # Worker-job resources (memory request==limit==value, Guaranteed QoS). Retune here
            # without a new image; the operator restarts and new jobs pick up the values.
            - name: JOB_CPU
              value: "1000m" # CPU limit: workers plateau at ~1 core, so 1000m is the useful ceiling (1.5 was wasted).
            - name: JOB_CPU_REQUEST
              value: "500m" # burstable: request 0.5 core so ~5-6 pods fit (real concurrency win), each bursts to the 1000m limit. Guaranteed-CPU dropped since workers are ~1-core-bound + CPU is compressible.
            - name: JOB_MEM_SIGNALS
              value: "256Mi" # right-sized: measured peak ~208Mi (1.23x headroom); frees mem-quota so CPU is the concurrency limiter, not memory
            - name: JOB_MEM_SIMULATION
              value: "1Gi"
            - name: JOB_MEM_DOWNLOAD
              value: "768Mi"
            - name: JOB_MEM_PLANNING
              value: "384Mi"
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: trading-postgres
                  key: dsn
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              # Holds the full TaskPlan + per-job reconcile state in memory. A multi-config
              # grid (e.g. 6 configs x 347 instruments = ~2082 tasks, ~350KB plan) OOM'd at
              # 256Mi and stalled/failed the run. 1Gi gives headroom for large grids.
              memory: 1Gi
