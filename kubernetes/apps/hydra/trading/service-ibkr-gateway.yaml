apiVersion: v1
kind: Service
metadata:
  name: ibkr-gateway
  namespace: trading
spec:
  selector:
    app: ibkr-gateway
  ports:
    # gnzsnz/ib-gateway socat-exposes the API on 4003 (live) / 4004 (paper);
    # 4001/4002 bind localhost-only inside the container.
    - name: live
      port: 4003
      targetPort: 4003
    - name: paper
      port: 4004
      targetPort: 4004
