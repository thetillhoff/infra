apiVersion: v1
kind: ResourceQuota
metadata:
  name: trading-quota
  namespace: trading
spec:
  # Hard ceiling so the trading namespace can never exhaust the whole cluster again.
  # 2026-07-13: a grid fanned out ~2082 worker pods; combined memory tipped the nodes into
  # global OOM (killed apiserver, kubelet, longhorn-manager). These caps bound the memory
  # footprint, pod-object count, and CPU so a runaway grid stays contained.
  #
  # Tightened 2026-07-14 after a full grid tipped node-2 NotReady: the driver is peak object
  # count (live pods → cAdvisor/prometheus series + apiserver churn), not worker pod memory. Cap
  # concurrent pods hard at 10 and CPU at 7 cores so a grid stays small on this control-plane-only
  # cluster. pods=10 counts the ~5 always-on trading pods too, so ~5 grid slots; paired with
  # MAX_INFLIGHT_JOBS=5 (operator, matched so no FailedCreate churn) + Job TTL (completed pods self-delete).
  # quota is namespace-total, not per-node; the scheduler spreads pods.
  hard:
    requests.cpu: "7"
    requests.memory: 6Gi
    limits.memory: 8Gi
    pods: "10"
