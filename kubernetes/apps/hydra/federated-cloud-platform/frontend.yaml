apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: federated-cloud-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: frontend
          image: ghcr.io/thetillhoff/federated-cloud-platform/frontend:1 # {"$imagepolicy": "federated-cloud-platform:fcp-frontend"}
          ports:
            - containerPort: 80
          # ponytail: nginx binds port 80 as root; switch to nginx-unprivileged + port 8080 to add runAsNonRoot
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: federated-cloud-platform
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
