# Copy the SOPS-encrypted content from trading/ghcr-creds.secret.yaml
# (same GHCR credentials, just change metadata.namespace to federated-cloud-platform)
# then re-encrypt with: sops -e -i ghcr-creds.secret.yaml
apiVersion: v1
data:
  .dockerconfigjson: CHANGEME
kind: Secret
metadata:
  name: ghcr-creds
  namespace: federated-cloud-platform
type: kubernetes.io/dockerconfigjson
