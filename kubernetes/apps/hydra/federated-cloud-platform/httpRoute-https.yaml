apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fcp-https
  namespace: federated-cloud-platform
spec:
  parentRefs:
  - name: https-gateway-thetillhoff-de
    namespace: gateways
  hostnames:
  - fcp.thetillhoff.de
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend
      port: 80
