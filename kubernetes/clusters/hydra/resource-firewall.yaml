apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: resource-firewall
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-controllers
  interval: 10m0s
  path: ./kubernetes/infrastructure/resources/firewall
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
