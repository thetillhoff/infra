apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-wedding-website
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./kubernetes/apps/hydra/wedding-website
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
