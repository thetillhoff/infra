apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./kubernetes/apps/hydra
  # MIGRATION Phase 1: prune disabled so removing this monolith in Phase 2 does NOT
  # garbage-collect all apps. The per-app Kustomizations then adopt the existing resources.
  prune: false
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
