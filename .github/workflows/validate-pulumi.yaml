name: Validate Pulumi changes

on:
  push:
    branches:
      - main
    paths:
      - ".github/**"
      - "pulumi/**"
  workflow_dispatch:

jobs:
  preview:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: pulumi
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          cache: 'npm'
          node-version-file: pulumi/.nvmrc
          cache-dependency-path: 'pulumi/package-lock.json'
      - run: npm ci

      - run: pulumi preview
        env:
          PULUMI_STACK: 'infra'
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  plan:
    needs: preview
    runs-on: ubuntu-24.04
    concurrency: pulumi-state
    defaults:
      run:
        working-directory: pulumi
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          cache: 'npm'
          node-version-file: pulumi/.nvmrc
          cache-dependency-path: 'pulumi/package-lock.json'
      - run: npm ci

      - run: pulumi preview
        env:
          PULUMI_STACK: 'infra'
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
