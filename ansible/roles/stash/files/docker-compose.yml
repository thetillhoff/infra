name: stash
services:
  stash:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    logging:
      driver: "json-file"
      options:
        max-file: "10"
        max-size: "2m"
    environment:
      - STASH_STASH=/data/
      - STASH_GENERATED=/generated/
      - STASH_METADATA=/metadata/
      - STASH_CACHE=/cache/
      - STASH_BACKUP_DIRECTORY_PATH=/backups/
      ## Adjust below to change default port (9999)
      - STASH_PORT=80
    # user: ${UID}:${GID}
    volumes:
      # Enable UID/GID lookups from host
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro

      - /etc/localtime:/etc/localtime:ro

      ## Keep configs, scrapers, and plugins here.

      - /mnt/hot/stash/config:/root/.stash
      - ./plugins/video-reencoder:/root/.stash/plugins/video-reencoder:ro
      - ./plugins/duplicate-merger:/root/.stash/plugins/duplicate-merger:ro
      ## Point this at your collection.
      # - ./data:/data
      - /mnt/cold/public/videos:/data
      ## This is where your stash's metadata lives
      - /mnt/hot/stash/metadata:/metadata
      ## Any other cache content.
      - /mnt/hot/stash/cache:/cache
      ## Where to store binary blob data (scene covers, images)
      - /mnt/hot/stash/blobs:/blobs
      ## Where to store generated content (screenshots,previews,transcodes,sprites)
      - /mnt/hot/stash/generated:/generated
      ## Where to store automatic database backups
      - /mnt/hot/stash/backups:/backups

  caddy:
    image: caddy:2.11.4@sha256:cfeb0b281bc44a5a51fecde39e9e577c60d863c0b6196e6bbdf58fd00960887f
    restart: always
    logging:
      driver: "json-file"
      options:
        max-file: "10"
        max-size: "2m"
    ports:
      - 80:80
      - 443:443
    configs:
      - source: Caddyfile
        target: /etc/caddy/Caddyfile
    #command: caddy reverse-proxy --internal-certs --from blackhole.deer-alphard.ts.net --to stash
    #command: caddy reverse-proxy --internal-certs --from blackhole.lan --to stash
    #command: caddy reverse-proxy --internal-certs --from blackhole.lan --from blackhole.deer-alphard.ts.net --to stash
    volumes:
      - /etc/localtime:/etc/localtime:ro

configs:
  Caddyfile:
    content: |
      blackhole.lan {
        reverse_proxy stash
        tls internal
      }
